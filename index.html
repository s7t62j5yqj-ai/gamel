<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<title>Fast Touch X</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;
  height:100vh;
  background:#02020a;
  color:#fff;
  overflow:hidden;
}

/* Animated Background */
.bg{
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 30% 20%, #00ffd533, transparent 40%),
              radial-gradient(circle at 70% 80%, #00ff8833, transparent 40%),
              #02020a;
  z-index:-1;
}

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-1;
}

.particles span{
  position:absolute;
  width:4px;height:4px;
  background:#00ffd5;
  border-radius:50%;
  opacity:0.5;
  animation:float 8s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:15px;
}

.card{
  width:100%;
  max-width:380px;
  background:rgba(255,255,255,0.05);
  border-radius:22px;
  padding:18px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(0,255,200,0.12);
  text-align:center;
}

.hidden{display:none}

h1{
  font-family:'Orbitron';
  color:#00ffd5;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
}

.main-btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#ff9800,#ff5722);
  color:#fff;
  font-weight:bold;
}

/* Game Layout Full Screen */
.game-layout{
  display:flex;
  flex-direction:column;
  height:100%;
  justify-content:space-between;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.timer{
  font-size:42px;
  font-family:'Orbitron';
}

.progress{
  height:8px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ffd5,#00ff88);
  transition:width .05s linear;
}

.center-area{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

#tapBtn{
  width:140px;height:140px;
  border-radius:50%;
  border:none;
  font-size:18px;
  font-weight:bold;
  background:linear-gradient(145deg,#00ffd5,#00ff88);
  box-shadow:0 0 50px rgba(0,255,200,0.7);
  transition:0.06s;
}

#tapBtn:active{
  transform:scale(.85);
}

.bottom-area{
  font-size:14px;
  opacity:0.8;
}

/* End */
.quote{margin-top:10px;font-size:14px;opacity:0.9}
.coupon{font-size:20px;color:#00ff88;margin:8px 0}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.box{background:rgba(255,255,255,0.08);padding:14px;border-radius:12px;font-size:13px;cursor:pointer;text-align:center}
.box:hover{background:rgba(0,255,150,0.2)}

</style>
</head>
<body>

<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="container">

<div class="card" id="start">
  <h1>⚡ Fast Touch X</h1>
  <input id="name" placeholder="Enter your name">
  <button class="main-btn" onclick="begin()">Start</button>
</div>

<div class="card hidden" id="game">
  <div class="game-layout">

    <div class="top-bar">
      <span id="score">0</span>
      <span id="combo">x1</span>
    </div>

    <div class="timer" id="timer">10</div>

    <div class="progress"><div id="bar" class="bar"></div></div>

    <div class="center-area">
      <button id="tapBtn">TAP</button>
    </div>

    <div class="bottom-area" id="status">Tap fast</div>

  </div>
</div>

<div class="card hidden" id="choice">
  <h1>🎁 Choose Your Reward</h1>
  <p style="font-size:13px;opacity:.8">Memorize… shuffling soon</p>
  <div class="grid" id="rewardGrid"></div>
</div>

<div class="card hidden" id="end">
  <h1 id="title"></h1>
  <p id="performance"></p>
  <div class="coupon">R1C1A1988BYFL3KU</div>
  <p id="gratitude" class="quote"></p>
  <p id="quote" class="quote"></p>
  <button class="main-btn" onclick="visit()">Claim Reward</button>
</div>

</div>

<script>
// particles
const pContainer=document.getElementById('particles');
for(let i=0;i<30;i++){
  let s=document.createElement('span');
  s.style.left=Math.random()*100+'vw';
  s.style.animationDuration=(5+Math.random()*5)+'s';
  pContainer.appendChild(s);
}

let score=0, combo=1, time=10, running=false;
let interval;

const tap=document.getElementById('tapBtn');
const scoreEl=document.getElementById('score');
const comboEl=document.getElementById('combo');
const timerEl=document.getElementById('timer');
const bar=document.getElementById('bar');
const status=document.getElementById('status');

function begin(){
  document.getElementById('start').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  start();
}

function start(){
  score=0; combo=1; time=10; running=true;

  interval=setInterval(()=>{
    time--;
    timerEl.textContent=time;
    if(time<=0) end();
  },1000);
}

tap.onclick=()=>{
  if(!running) return;

  score+=combo;
  combo++;

  scoreEl.textContent=score;
  comboEl.textContent='x'+combo;

  bar.style.width=Math.min(score*2,100)+'%';

  if(score>20) status.textContent='🔥 Speed rising';
  if(score>40) status.textContent='⚡ Insane';

  if(navigator.vibrate) navigator.vibrate(5);
};

function end(){
  clearInterval(interval);
  running=false;

  document.getElementById('game').classList.add('hidden');
  showRewards();
}

/* REWARD SYSTEM */

const rewards=[
  "₹999 Cash Prize",
  "99% Coupon Code",
  "70% Recharge Discount",
  "₹500 Gift Card",
  "₹1200 Mega Reward",
  "Free Shopping Voucher",
  "₹750 Cashback",
  "Premium Coupon Access",
  "₹300 Bonus",
  "Special Surprise Reward"
];

const grid=document.getElementById('rewardGrid');

function showRewards(){
  const choice=document.getElementById('choice');
  choice.classList.remove('hidden');

  grid.innerHTML="";

  rewards.forEach(r=>{
    let div=document.createElement('div');
    div.className='box';
    div.innerText=r;
    grid.appendChild(div);
  });

  setTimeout(shuffleRewards,2000);
}

function shuffleRewards(){
  const boxes=document.querySelectorAll('.box');

  boxes.forEach(b=>{
    b.innerText='❓';
  });

  setTimeout(()=>{
    boxes.forEach(b=>b.onclick=pickReward);
  },500);
}

function pickReward(){
  document.getElementById('choice').classList.add('hidden');
  document.getElementById('end').classList.remove('hidden');

  const name=document.getElementById('name').value||'Player';

  document.getElementById('title').textContent=`🔥 ${name}, well played`;
  document.getElementById('performance').textContent=`${name}, your speed and focus were impressive.`;
  document.getElementById('gratitude').textContent='We truly appreciate your time and energy. Moments like this build something bigger. Keep going.';
  document.getElementById('quote').textContent='Consistency creates excellence.';
}, well played`;
  document.getElementById('performance').textContent=`${name}, great energy and focus.`;
  document.getElementById('gratitude').textContent='We truly appreciate your time and presence. Keep growing.';
  document.getElementById('quote').textContent='Consistency builds greatness.';
}

function visit(){
  window.open('https://mamaearth.in/');
}
</script>

</body>
</html>
