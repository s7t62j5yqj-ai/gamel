<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<title>Fast Touch X</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background: radial-gradient(circle at center,#04040a,#000);
  color:#fff;
  overflow:hidden;
}
.container{max-width:380px;margin:auto;padding:14px;text-align:center}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:22px;
  padding:18px;
  backdrop-filter:blur(22px);
  box-shadow:0 0 60px rgba(0,255,200,0.12);
  transition:transform .35s ease,opacity .35s ease;
}
.hidden{display:none}

h1{font-family:'Orbitron',sans-serif;color:#00ffd5;font-size:22px;margin:6px 0 10px}

input{
  width:100%;padding:12px;border-radius:12px;border:none;margin-bottom:10px;
}
.main-btn{
  width:100%;padding:12px;border-radius:12px;border:none;
  background:linear-gradient(90deg,#ff9800,#ff5722);
  color:#fff;font-weight:700;letter-spacing:.3px
}

/* Fingerprint */
.fp-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 0}
.fp{
  width:160px;height:160px;border-radius:50%;
  position:relative;
  background:radial-gradient(circle,rgba(0,255,200,0.08),transparent 60%);
  box-shadow:inset 0 0 30px rgba(0,255,200,0.15),0 0 40px rgba(0,255,200,0.2);
}
.fp::before{
  content:"";position:absolute;inset:14px;border-radius:50%;
  background:repeating-radial-gradient(circle at center,
    rgba(0,255,200,.8) 0 1px, transparent 2px 6px);
  filter:blur(.2px);
  opacity:.9;
}
.scan{
  position:absolute;left:8px;right:8px;height:3px;border-radius:3px;
  background:linear-gradient(90deg,transparent,#00ffd5,transparent);
  box-shadow:0 0 12px #00ffd5;
  animation:scan 1.2s linear infinite;
}
@keyframes scan{0%{top:12%}50%{top:88%}100%{top:12%}}

.auth{
  font-family:'Orbitron';
  letter-spacing:.8px;color:#00ff88;
  opacity:0;transform:translateY(6px);
  transition:.35s ease;
}
.auth.show{opacity:1;transform:translateY(0)}

/* Game */
.stats{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px}
.timer{font-size:38px;font-family:'Orbitron';margin:6px 0}
.timer.low{color:#ff3b3b;animation:blink .35s infinite}
@keyframes blink{50%{opacity:.3}}

.progress{height:8px;background:#1b1b1b;border-radius:10px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#00ffd5,#00ff88);transition:width .07s linear}

.tap-area{display:flex;justify-content:center;align-items:center;height:200px}
#tapBtn{
  width:132px;height:132px;border-radius:50%;border:none;
  font-weight:800;font-size:18px;color:#001;
  background:linear-gradient(145deg,#00ffd5,#00ff88);
  box-shadow:0 0 40px rgba(0,255,200,.7);
  transition:transform .07s ease, box-shadow .12s ease;
}
#tapBtn:active{transform:scale(.85);box-shadow:0 0 70px rgba(0,255,200,1)}

.status{font-size:14px;opacity:.85;margin-top:6px}

/* End */
.quote{margin-top:12px;font-size:14px;opacity:.85}

/* Cinematic transitions */
.fade-in{animation:fadeIn .35s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>
<body>

<div class="container">

<!-- START -->
<div class="card fade-in" id="start">
  <h1>⚡ Fast Touch X</h1>
  <input id="name" placeholder="Enter your name">
  <button class="main-btn" onclick="toFingerprint()">Continue</button>
</div>

<!-- FINGERPRINT -->
<div class="card hidden" id="fingerprint">
  <h1>🔒 Verify Identity</h1>
  <div class="fp-wrap">
    <div class="fp" id="fp">
      <div class="scan" id="scan"></div>
    </div>
    <div id="auth" class="auth">AUTHENTICATED</div>
    <div class="status">Place your finger…</div>
  </div>
</div>

<!-- GAME -->
<div class="card hidden" id="game">
  <div class="stats">
    <span id="score">0</span>
    <span id="combo">x1</span>
  </div>
  <div id="timer" class="timer">10</div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <div class="tap-area"><button id="tapBtn">TAP</button></div>
  <div id="status" class="status">Start tapping…</div>
</div>

<!-- END -->
<div class="card hidden" id="end">
  <h1 id="title"></h1>
  <p id="performance"></p>
  <h3 style="color:#00ff88">R1C1A1988BYFL3KU</h3>
  <p id="gratitude" class="quote"></p>
  <button class="main-btn" onclick="visit()">Claim Reward</button>
</div>

</div>

<script>
let score=0, combo=1, time=10, running=false;
let interval;

const tap=document.getElementById('tapBtn');
const scoreEl=document.getElementById('score');
const comboEl=document.getElementById('combo');
const timerEl=document.getElementById('timer');
const bar=document.getElementById('bar');
const status=document.getElementById('status');

function toFingerprint(){
  document.getElementById('start').classList.add('hidden');
  const fpCard=document.getElementById('fingerprint');
  fpCard.classList.remove('hidden');
  fpCard.classList.add('fade-in');

  // fast cinematic scan → authenticate
  setTimeout(()=>{
    document.getElementById('auth').classList.add('show');
    document.querySelector('#fingerprint .status').textContent='Authenticated';
  },900);

  setTimeout(()=>{
    fpCard.classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    document.getElementById('game').classList.add('fade-in');
    start();
  },1300);
}

function start(){
  score=0; combo=1; time=10; running=true;
  scoreEl.textContent=0; comboEl.textContent='x1'; bar.style.width='0%';
  timerEl.classList.remove('low'); timerEl.textContent=10;

  interval=setInterval(()=>{
    time--; timerEl.textContent=time;
    if(time<=3) timerEl.classList.add('low');
    if(time<=0) end();
  },1000);
}

tap.onclick=()=>{
  if(!running) return;
  score+=combo; combo++;
  scoreEl.textContent=score; comboEl.textContent='x'+combo;
  bar.style.width=Math.min(score*2,100)+'%';

  if(score>20) status.textContent='🔥 You\'re on fire';
  if(score>40) status.textContent='⚡ Insane speed';

  if(navigator.vibrate) navigator.vibrate(6);
};

function end(){
  clearInterval(interval); running=false;
  document.getElementById('game').classList.add('hidden');
  const end=document.getElementById('end');
  end.classList.remove('hidden'); end.classList.add('fade-in');

  const name=document.getElementById('name').value || 'Player';
  document.getElementById('title').textContent=`🔥 ${name}, that was intense!`;

  let msg='';
  if(score>60) msg='You dominated with elite reflexes and control.';
  else if(score>30) msg='Strong performance — speed and consistency on point.';
  else msg='Good effort — you\'re closer than you think.';

  document.getElementById('performance').textContent=`${name}, ${msg}`;

  document.getElementById('gratitude').textContent=
    'We appreciate you showing up with focus and energy. Moments like this build momentum. Keep pushing — speed is earned, not given. 🚀';
}

function visit(){ window.open('https://mamaearth.in/'); }
</script>

</body>
</html>
